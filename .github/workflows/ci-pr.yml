name: CI PR Gates (Web)

on:
  pull_request:
    branches:
      - staging
      - main
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

permissions:
  contents: read

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: |
          npm ci \
            --workspace @referidos/referidos-app \
            --workspace @referidos/prelaunch \
            --workspace @referidos/support-sdk \
            --workspace @referidos/notifications-sdk \
            --workspace @referidos/observability \
            --workspace @referidos/legal-content \
            --workspace @referidos/api-client \
            --workspace @referidos/domain \
            --workspace @referidos/platform-web \
            --workspace @referidos/security-core \
            --include-workspace-root

      - name: Run lint
        run: |
          npm run lint:mojibake
          npm run lint -w @referidos/referidos-app
          npm run lint -w @referidos/prelaunch

  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: |
          npm ci \
            --workspace @referidos/referidos-app \
            --workspace @referidos/prelaunch \
            --workspace @referidos/support-sdk \
            --workspace @referidos/notifications-sdk \
            --workspace @referidos/observability \
            --workspace @referidos/legal-content \
            --workspace @referidos/api-client \
            --workspace @referidos/domain \
            --workspace @referidos/platform-web \
            --workspace @referidos/security-core \
            --include-workspace-root

      - name: Run tests
        run: |
          npm run test -w @referidos/referidos-app --if-present
          npm run test -w @referidos/prelaunch --if-present

  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: |
          npm ci \
            --workspace @referidos/referidos-app \
            --workspace @referidos/prelaunch \
            --workspace @referidos/support-sdk \
            --workspace @referidos/notifications-sdk \
            --workspace @referidos/observability \
            --workspace @referidos/legal-content \
            --workspace @referidos/api-client \
            --workspace @referidos/domain \
            --workspace @referidos/platform-web \
            --workspace @referidos/security-core \
            --include-workspace-root

      - name: Build Referidos App
        run: npm run build:app

      - name: Build Prelaunch
        run: npm run build:prelaunch
